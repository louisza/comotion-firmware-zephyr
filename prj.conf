# CoMotion Tracker - Step 7: LED + IMU + BLE + GPS + PDM Mic + SD Card + Battery
CONFIG_GPIO=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# IMU (LSM6DS3TR-C on I2C0, uses st,lsm6dsl driver)
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y

# Float formatting for printk/snprintf
CONFIG_CBPRINTF_FP_SUPPORT=y

# BLE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="CoMotion"
CONFIG_BT_MAX_CONN=1

# Nordic UART Service
CONFIG_BT_NUS=y

# GPS (ATGM332D on UART0 via Zephyr GNSS framework)
CONFIG_SERIAL=y
CONFIG_GNSS=y

# PDM Microphone (onboard MSM261D3526HICPM-C via Zephyr DMIC API)
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# SD Card (external SPI, FAT filesystem)
CONFIG_SPI=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y

# Battery voltage monitor (voltage-divider sensor on AIN7)
CONFIG_ADC=y

# Bigger main stack for snprintf + BLE + FS
CONFIG_MAIN_STACK_SIZE=4096
