# ═══════════════════════════════════════════════════════════════
# CoMotion Tracker — Zephyr / NCS Configuration
# Board: xiao_ble/nrf52840/sense
# ═══════════════════════════════════════════════════════════════

# ─── Core ───
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192

# ─── Logging ───
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=2048

# ─── Console over USB CDC ACM ───
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# ─── GPIO / LEDs ───
CONFIG_GPIO=y
CONFIG_LED=y

# ─── BLE Core ───
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="CoMotion"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_DEVICE_NAME_MAX=16
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y

# ─── BLE Extended Advertising + Coded PHY ───
CONFIG_BT_EXT_ADV=y
CONFIG_BT_EXT_ADV_MAX_ADV_SET=2
CONFIG_BT_CTLR_ADV_EXT=y
CONFIG_BT_CTLR_PHY_CODED=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ─── BLE NUS (Nordic UART Service) ───
CONFIG_BT_NUS=y
CONFIG_BT_GATT_CLIENT=y

# ─── Sensors: IMU (LSM6DS3 / LSM6DSL driver) ───
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_TRIGGER_GLOBAL_THREAD=y

# ─── PDM Microphone (via nrfx) ───
CONFIG_NRFX_PDM=y

# ─── GPS UART (UART1, interrupt-driven) ───
CONFIG_UART_INTERRUPT_DRIVEN=y

# ─── SD Card (SPI + FAT FS) ───
CONFIG_SPI=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_LFN_MODE_HEAP=y

# ─── ADC (Battery voltage) ───
CONFIG_ADC=y

# ─── Float formatting for snprintf ───
CONFIG_CBPRINTF_FP_SUPPORT=y

# ─── Timing ───
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
