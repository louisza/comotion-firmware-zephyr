# CoMotion Tracker - Full Integrated Firmware (v2.0)
CONFIG_GPIO=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# FPU (nRF52840 Cortex-M4F hardware FPU)
CONFIG_FPU=y

# IMU (LSM6DS3TR-C on I2C0, uses st,lsm6dsl driver)
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y

# Float formatting for printk/snprintf (CSV output at 104 Hz)
CONFIG_CBPRINTF_FP_SUPPORT=y

# BLE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="CoMotion"
CONFIG_BT_MAX_CONN=1

# Nordic UART Service
CONFIG_BT_NUS=y

# GPS (ATGM332D on UART0 via Zephyr GNSS framework)
CONFIG_SERIAL=y
CONFIG_GNSS=y

# PDM Microphone (onboard MSM261D3526HICPM-C via Zephyr DMIC API)
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# SD Card (external SPI, FAT filesystem)
CONFIG_SPI=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_LFN_MODE_HEAP=y

# Battery voltage monitor (voltage-divider sensor on AIN7)
CONFIG_ADC=y

# Stack sizes (main runs 104 Hz with snprintf CSV formatting)
CONFIG_MAIN_STACK_SIZE=8192

# Ring buffer for SD card logging
CONFIG_RING_BUFFER=y

# === BLE Range Optimization ===

# TX Power: +8 dBm (maximum for nRF52840, ~2.5x range improvement)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Coded PHY (Long Range): ~4x range via forward error correction
CONFIG_BT_CTLR_PHY_CODED=y
CONFIG_BT_USER_PHY_UPDATE=y

# Extended advertising: dual adv sets (Coded PHY broadcast + 1M connectable)
CONFIG_BT_EXT_ADV=y
CONFIG_BT_CTLR_ADV_EXT=y
CONFIG_BT_EXT_ADV_MAX_ADV_SET=2
CONFIG_BT_CTLR_ADV_SET=2
CONFIG_BT_CTLR_ADV_DATA_LEN_MAX=64

# Data Length Extension: larger PDUs = better throughput per connection event
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=247
